{% extends 'base.html' %}
{% block title %}Student Registration{% endblock %}

{% block content %}

<div class="mx-auto max-w-lg bg-white p-8 rounded-2xl shadow-md">

    <h3 class="text-2xl font-bold text-slate-900 text-center">
        Student Registration
    </h3>

    <!-- IMPORTANT enctype -->
    <form method="post" enctype="multipart/form-data" class="mt-6 space-y-5">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    {{ field.label }}
                </label>

                {{ field }}

                {% if field.errors %}
                    <p class="text-sm text-red-500 mt-1">
                        {{ field.errors|striptags }}
                    </p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit"
            class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-500 transition">
            Register
        </button>

    </form>

</div>

{% endblock %}
