{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}

{% block content %}

<div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
    <h1 class="text-2xl font-bold text-red-600 mb-4">Delete Post</h1>
    <p class="mb-6">Are you sure you want to delete "{{ post.title }}"?</p>

    <form method="post" class="inline">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-500 transition">Yes, delete</button>
    </form>

    <a href="{% url 'blog:post_detail' post.pk %}" class="ml-4 text-slate-600 hover:text-slate-900">Cancel</a>
</div>

{% endblock %}
