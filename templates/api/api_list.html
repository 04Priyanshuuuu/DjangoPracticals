{% extends 'base.html' %}
{% block title %}APIs{% endblock %}

{% block content %}

<div class="min-h-[calc(100vh-80px)] flex flex-col px-4">

    <h1 class="text-3xl font-bold mb-3 text-left w-full max-w-7xl mx-auto">
        🚀 API Dashboard
    </h1>

    <div class="w-full max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        
    <!-- 🔹 COLUMN 1: SIDEBAR -->
    <div class="bg-white p-5 rounded-2xl shadow h-full">

        <h3 class="text-lg font-semibold mb-4">APIs</h3>

        <div class="space-y-3">

            <button onclick="selectAPI('/api/books/')"
                class="w-full text-left px-3 py-2 rounded-lg hover:bg-indigo-100">
                📚 Book API
            </button>

            <button onclick="selectAPI('/api/movies/')"
                class="w-full text-left px-3 py-2 rounded-lg hover:bg-green-100">
                🎬 Movie API
            </button>

        </div>

        <button onclick="openDRF()"
            class="mt-6 w-full bg-gray-900 text-white py-2 rounded-lg">
            Open DRF UI ↗
        </button>

    </div>

    <!-- 🔹 COLUMN 2: INPUTS -->
    <div class="bg-white p-6 rounded-2xl shadow h-full flex flex-col">

        <h2 class="text-lg font-bold mb-4">🚀 API Tester</h2>

        <!-- METHOD -->
        <select id="method"
            class="border p-2 rounded mb-3">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
        </select>

        <!-- TOGGLE -->
        <div class="flex gap-3 mb-3 text-sm">
            <button onclick="setMode('form')" id="formBtn"
                class="px-3 py-1 bg-indigo-600 text-white rounded">
                Form
            </button>
            <button onclick="setMode('json')" id="jsonBtn"
                class="px-3 py-1 border rounded">
                JSON
            </button>
        </div>

        <!-- FORM INPUT -->
        <div id="formInputs" class="space-y-2 mb-3">
            <input id="title" placeholder="Title"
                class="w-full border p-2 rounded">
            <input id="author" placeholder="Author"
                class="w-full border p-2 rounded">
            <input id="price" placeholder="Price"
                class="w-full border p-2 rounded">
        </div>

        <!-- JSON INPUT -->
        <textarea id="jsonInput" rows="4"
            class="w-full border p-2 rounded mb-3 hidden font-mono text-sm"
            placeholder='{"title":"Book","author":"Name","price":100}'></textarea>

        <!-- BUTTON -->
        <button onclick="runAPI()"
            class="bg-indigo-600 text-white py-2 rounded mb-3 hover:bg-indigo-500">
            ▶ Run
        </button>

        <p class="text-xs text-gray-500">
            Selected: <span id="selectedApi">/api/books/</span>
        </p>

    </div>

    <!-- 🔹 COLUMN 3: OUTPUT -->
    <div class="bg-white p-4 rounded-2xl shadow h-full flex flex-col">

        <h3 class="text-sm font-semibold mb-2">📊 Response</h3>

        <pre id="output"
            class="bg-white border rounded p-3 flex-1 overflow-auto text-sm font-mono"></pre>

    </div>

</div>
</div>

<script>
let currentAPI = "/api/books/";
let mode = "form";

function selectAPI(api) {
    currentAPI = api;
    document.getElementById("selectedApi").innerText = api;
}

function openDRF() {
    window.open(currentAPI, "_blank");
}

function setMode(m) {
    mode = m;

    document.getElementById("formInputs").style.display =
        m === "form" ? "block" : "none";

    document.getElementById("jsonInput").style.display =
        m === "json" ? "block" : "none";

    document.getElementById("formBtn").classList.toggle("bg-indigo-600", m==="form");
    document.getElementById("jsonBtn").classList.toggle("bg-indigo-600", m==="json");
}

function syntaxHighlight(json) {
    json = JSON.stringify(json, null, 2);
    json = json.replace(/(&|<|>)/g, function (match) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;'}[match];
    });

    return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|\b\d+\b)/g,
        function (match) {
            let color = 'text-blue-600';

            if (/^"/.test(match)) {
                if (/:$/.test(match)) {
                    color = 'text-purple-600'; // keys
                } else {
                    color = 'text-green-600'; // string values
                }
            } else if (/true|false/.test(match)) {
                color = 'text-indigo-600';
            } else if (/null/.test(match)) {
                color = 'text-gray-500';
            } else {
                color = 'text-red-600'; // numbers
            }

            return `<span class="${color}">${match}</span>`;
        }
    );
}

async function runAPI() {
    const method = document.getElementById("method").value;

    let bodyData = {};

    if (mode === "form") {
        bodyData = {
            title: document.getElementById("title").value,
            author: document.getElementById("author").value,
            price: document.getElementById("price").value
        };
    } else {
        bodyData = JSON.parse(document.getElementById("jsonInput").value || "{}");
    }

    let options = {
        method: method,
        headers: {
            "Content-Type": "application/json"
        }
    };

    if (method !== "GET") {
        options.body = JSON.stringify(bodyData);
    }

    try {
        const res = await fetch(currentAPI, options);
        const data = await res.json();

        document.getElementById("output").innerHTML =
            syntaxHighlight(data);

    } catch (err) {
        document.getElementById("output").innerText = err;
    }
}
</script>

{% endblock %}
