{% extends 'base.html' %}
{% block title %}Logout{% endblock %}

{% block content %}
<div class="mx-auto max-w-sm bg-white p-8 rounded-2xl shadow-md text-center">

    <h3 class="text-2xl font-bold text-slate-900">
        Logout
    </h3>

    <p class="text-sm text-slate-500 mt-2">
        Kya aap sure ho ke logout karna hai?
    </p>

    <form method="post" class="mt-6">
        {% csrf_token %}

        <button type="submit"
            class="w-full bg-red-600 text-white py-2.5 rounded-lg font-medium hover:bg-red-500 transition">
            Yes, Logout
        </button>
    </form>

    <a href="/"
       class="block mt-4 text-sm text-indigo-600 hover:underline">
        Cancel
    </a>

</div>
{% endblock %}
