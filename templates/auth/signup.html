{% extends 'base.html' %}
{% block title %}Signup{% endblock %}

{% block content %}
<div class="mx-auto max-w-sm bg-white p-8 rounded-2xl shadow-md">

    <h3 class="text-2xl font-bold text-center text-slate-900">
        Create Account
    </h3>

    <p class="text-sm text-center text-slate-500 mt-1">
        Sign up to get started
    </p>

    <form method="post" class="mt-6 space-y-5" novalidate>
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    {{ field.label }}
                </label>

                <input 
                    type="{{ field.field.widget.input_type }}"
                    name="{{ field.name }}"
                    value="{{ field.value|default_if_none:'' }}"
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                >

                {% if field.errors %}
                    <p class="mt-1 text-xs text-red-600">
                        {{ field.errors|striptags }}
                    </p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit"
            class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-500 transition">
            Sign Up
        </button>
    </form>

</div>
{% endblock %}
